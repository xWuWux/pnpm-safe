# pnpm-safe rules file
# Format: LEVEL <package-name-glob> <reason>
#   LEVEL: BLOCK or WARN
#   package-name-glob: exact name or shell glob (e.g., @evil/*, lodash)
#   reason: free text, shown in output
#
# These rules are evaluated AFTER registry checks and IOC matching.
# Use them for organization-specific policies, known-bad packages,
# or temporary holds while you investigate a package.
#
# Examples:
#
# BLOCK   colors          colors@1.4.1 was intentionally sabotaged by its author (Jan 2022)
# BLOCK   faker           Same author as colors — sabotage incident
# WARN    @left-pad/*     Historical context: left-pad unpublish incident (2016)
# BLOCK   node-ipc        Malicious code injected by maintainer targeting Russian IPs (Mar 2022)
# WARN    event-source-polyfill  XSS vuln exploited in crypto theft (2023)
#
# Template for your org's internal holds:
# BLOCK   @yourscope/compromised-pkg   Reason: maintainer account takeover suspected YYYY-MM-DD
